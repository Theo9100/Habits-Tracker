<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Habitudes">
<title>Mes Habitudes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: rgba(0,0,0,0.09);
    --border2: rgba(0,0,0,0.15);
    --text: #1a1915;
    --text2: #6b6a65;
    --text3: #a09f9a;
    --green: #4a8c3f;
    --green-bg: #eaf4e8;
    --green-light: #c8e6c2;
    --amber: #c47a1a;
    --amber-bg: #fdf3e0;
    --blue: #2a6fb5;
    --blue-bg: #e8f1fa;
    --red: #c0392b;
    --radius: 14px;
    --radius-sm: 9px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --surface: #1e1e1c;
      --surface2: #272724;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #f0efe9;
      --text2: #9a9990;
      --text3: #5a5955;
      --green: #6db861;
      --green-bg: #1a2e18;
      --green-light: #2a4527;
      --amber: #e8a030;
      --amber-bg: #2a200e;
      --blue: #5a9fd4;
      --blue-bg: #0e1e2e;
      --red: #e05545;
    }
  }

  body {
    font-family: -apple-system, 'SF Pro Text', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overscroll-behavior: none;
  }

  .app {
    max-width: 430px;
    margin: 0 auto;
    background: var(--bg);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    padding-top: var(--safe-top);
  }

  /* HEADER */
  .header {
    padding: 16px 20px 14px;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 20;
    border-bottom: 0.5px solid var(--border);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .app-title {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .streak-pill {
    background: var(--amber-bg);
    color: var(--amber);
    font-size: 13px;
    font-weight: 600;
    padding: 5px 11px;
    border-radius: 20px;
    border: 0.5px solid rgba(196,122,26,0.2);
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 3px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 3px;
  }
  .tab {
    flex: 1;
    padding: 8px 0;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    border-radius: 8px;
    cursor: pointer;
    border: none;
    background: none;
    transition: all 0.18s;
    font-family: inherit;
  }
  .tab.active {
    background: var(--surface);
    color: var(--text);
    font-weight: 600;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  /* CONTENT */
  .content {
    flex: 1;
    padding: 18px 20px calc(20px + var(--safe-bottom));
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* DATE NAV */
  .date-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .nav-btn {
    width: 38px;
    height: 38px;
    border: 0.5px solid var(--border2);
    border-radius: 10px;
    background: var(--surface);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    transition: opacity 0.15s;
    font-family: inherit;
  }
  .nav-btn:disabled { opacity: 0.25; }
  .nav-btn:active { background: var(--surface2); }
  .date-center { text-align: center; }
  .date-main { font-size: 16px; font-weight: 600; color: var(--text); }
  .date-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }

  /* PROGRESS RING */
  .progress-card {
    display: flex;
    align-items: center;
    gap: 18px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    padding: 16px 18px;
    margin-bottom: 18px;
  }
  .ring-wrap { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-pct {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 14px; font-weight: 700; color: var(--text);
  }
  .prog-info { flex: 1; }
  .prog-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .prog-sub { font-size: 13px; color: var(--text2); margin-top: 3px; }

  /* HABITS */
  .habits-list { display: flex; flex-direction: column; gap: 10px; }
  .habit-card {
    display: flex;
    align-items: center;
    gap: 13px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 15px 16px;
    cursor: pointer;
    transition: transform 0.12s, background 0.2s, border-color 0.2s;
    user-select: none;
    -webkit-user-select: none;
  }
  .habit-card:active { transform: scale(0.975); }
  .habit-card.done {
    background: var(--green-bg);
    border-color: var(--green-light);
  }
  .h-emoji { font-size: 26px; width: 38px; text-align: center; flex-shrink: 0; }
  .h-info { flex: 1; min-width: 0; }
  .h-name { font-size: 15px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .h-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .checkmark {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 2px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    background: var(--surface);
  }
  .habit-card.done .checkmark {
    background: var(--green);
    border-color: var(--green);
  }
  .checkmark svg { display: none; }
  .habit-card.done .checkmark svg { display: block; }

  /* ADD */
  .bottom-actions { margin-top: 18px; }
  .action-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .edit-link {
    font-size: 13px; color: var(--text3);
    background: none; border: none; cursor: pointer;
    font-family: inherit; padding: 4px 0;
  }
  .edit-link.active { color: var(--blue); }
  .add-btn {
    width: 100%;
    padding: 14px;
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    background: none;
    font-size: 14px;
    color: var(--text2);
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .add-btn:active { background: var(--surface2); }

  /* ADD FORM */
  .add-form {
    display: none;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-top: 10px;
  }
  .add-form.open { display: block; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .emoji-grid { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }
  .ep { width: 38px; height: 38px; border: 0.5px solid var(--border); border-radius: 9px; background: var(--surface2); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
  .ep.sel { border: 2px solid var(--blue); background: var(--blue-bg); }
  .form-row { display: flex; gap: 8px; }
  .text-input {
    flex: 1;
    padding: 10px 13px;
    border: 0.5px solid var(--border2);
    border-radius: 9px;
    font-size: 15px;
    background: var(--surface2);
    color: var(--text);
    font-family: inherit;
    outline: none;
    -webkit-appearance: none;
  }
  .text-input:focus { border-color: var(--blue); background: var(--surface); }
  .save-btn {
    padding: 10px 18px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 9px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }
  .save-btn:active { opacity: 0.85; }

  /* DELETE */
  .del-btn {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--red);
    border: none; color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    line-height: 1;
  }

  /* WEEK */
  .week-block { margin-bottom: 22px; }
  .week-block-title {
    font-size: 12px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.6px;
    margin-bottom: 10px;
  }
  .week-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .day-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .day-lbl { font-size: 10px; color: var(--text3); }
  .day-dot {
    width: 34px; height: 34px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
  }
  .day-dot.empty { background: var(--surface2); color: var(--text3); }
  .day-dot.full { background: var(--green); color: #fff; }
  .day-dot.partial { background: var(--amber-bg); color: var(--amber); border: 0.5px solid rgba(196,122,26,0.2); }
  .day-dot.future { background: var(--surface2); color: var(--border2); }
  .day-dot.today-ring { outline: 2px solid var(--blue); outline-offset: 1px; }
  .day-num { font-size: 10px; color: var(--text3); }

  .month-sel-row { margin-bottom: 16px; }
  .month-sel {
    width: 100%;
    padding: 9px 13px;
    border: 0.5px solid var(--border2);
    border-radius: 10px;
    font-size: 14px;
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
    cursor: pointer;
  }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 22px; }
  .stat-tile {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 15px;
  }
  .stat-val { font-size: 30px; font-weight: 700; color: var(--text); letter-spacing: -1px; }
  .stat-lbl { font-size: 12px; color: var(--text2); margin-top: 3px; line-height: 1.3; }
  .section-head { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 12px; }
  .hstat-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 15px;
    margin-bottom: 10px;
  }
  .hstat-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .hstat-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .hstat-pct { font-size: 14px; font-weight: 700; color: var(--green); }
  .bar-bg { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; background: var(--green); transition: width 0.5s; }
  .hstat-count { font-size: 11px; color: var(--text3); margin-top: 5px; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <span class="app-title">Habitudes</span>
      <span class="streak-pill" id="streak-pill">🔥 0 jour</span>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="showTab('today')">Aujourd'hui</button>
      <button class="tab" onclick="showTab('week')">Semaine</button>
      <button class="tab" onclick="showTab('stats')">Stats</button>
    </div>
  </div>

  <!-- TODAY -->
  <div class="content" id="tab-today">
    <div class="date-nav">
      <button class="nav-btn" id="prev-btn" onclick="changeDay(-1)">‹</button>
      <div class="date-center">
        <div class="date-main" id="date-main">—</div>
        <div class="date-sub" id="date-sub"></div>
      </div>
      <button class="nav-btn" id="next-btn" onclick="changeDay(1)">›</button>
    </div>

    <div class="progress-card">
      <div class="ring-wrap">
        <svg width="64" height="64" viewBox="0 0 64 64">
          <circle cx="32" cy="32" r="26" fill="none" stroke="var(--surface2)" stroke-width="5.5"/>
          <circle cx="32" cy="32" r="26" fill="none" stroke="var(--green)" stroke-width="5.5"
            stroke-dasharray="163.4" id="ring-arc" stroke-dashoffset="163.4" stroke-linecap="round"/>
        </svg>
        <div class="ring-pct" id="ring-pct">0%</div>
      </div>
      <div class="prog-info">
        <div class="prog-title" id="prog-title">0 / 0 habitudes</div>
        <div class="prog-sub" id="prog-sub">Bonne journée !</div>
      </div>
    </div>

    <div class="habits-list" id="habits-list"></div>

    <div class="bottom-actions">
      <div class="action-row">
        <button class="edit-link" id="edit-btn" onclick="toggleEdit()">Modifier</button>
      </div>
      <button class="add-btn" id="add-toggle" onclick="toggleForm()">+ Ajouter une habitude</button>
      <div class="add-form" id="add-form">
        <div class="form-label">Choisir un emoji</div>
        <div class="emoji-grid" id="emoji-grid"></div>
        <div class="form-label">Nom de l'habitude</div>
        <div class="form-row">
          <input class="text-input" id="habit-input" placeholder="Ex : Manger des fruits" maxlength="32">
          <button class="save-btn" onclick="addHabit()">Ajouter</button>
        </div>
      </div>
    </div>
  </div>

  <!-- WEEK -->
  <div class="content" id="tab-week" style="display:none;">
    <div class="month-sel-row">
      <select class="month-sel" id="month-sel" onchange="renderWeek()"></select>
    </div>
    <div id="week-body"></div>
  </div>

  <!-- STATS -->
  <div class="content" id="tab-stats" style="display:none;">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="section-head">Par habitude — 30 derniers jours</div>
    <div id="hstats"></div>
  </div>
</div>

<script>
const EMOJIS = ['🍎','💧','🏃','😴','📵','🧘','📚','🥗','🏋️','🚶','🎨','✍️','🛁','🌿','🎵','🌅','🧹','☕'];
let selEmoji = EMOJIS[0];
let editMode = false;

const todayStr = () => {
  const d = new Date();
  return [d.getFullYear(), String(d.getMonth()+1).padStart(2,'0'), String(d.getDate()).padStart(2,'0')].join('-');
};

let curDate = todayStr();

function load(k, d) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } }
function persist(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

let habits = load('hb_habits', [
  { id: 'h1', name: 'Manger des fruits', emoji: '🍎' },
  { id: 'h2', name: 'Se coucher tôt', emoji: '😴' },
  { id: 'h3', name: 'Moins d\'écran', emoji: '📵' },
]);
let done = load('hb_done', {});

const FR_DAYS = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const FR_MONTHS = ['janv','févr','mars','avr','mai','juin','juil','août','sept','oct','nov','déc'];
const FR_MONTHS_FULL = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

function dateLabel(s) {
  const [y,m,d] = s.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return `${FR_DAYS[dt.getDay()]} ${d} ${FR_MONTHS[m-1]} ${y}`;
}

function isFuture(s) { return s > todayStr(); }

function getDone(s) { return done[s] || []; }

function toggleHabit(id) {
  if (isFuture(curDate)) return;
  let d = getDone(curDate);
  done[curDate] = d.includes(id) ? d.filter(x => x !== id) : [...d, id];
  persist('hb_done', done);
  renderToday();
  updateStreak();
}

function habitStreak(hid, fromStr) {
  let s = 0, d = new Date(fromStr);
  while (true) {
    const str = d.toISOString().slice(0,10);
    if (getDone(str).includes(hid)) { s++; d.setDate(d.getDate()-1); } else break;
  }
  return s;
}

function updateStreak() {
  let s = 0, d = new Date(todayStr());
  while (true) {
    const str = d.toISOString().slice(0,10);
    const dd = getDone(str).filter(id => habits.find(h => h.id === id));
    if (habits.length > 0 && dd.length > 0) { s++; d.setDate(d.getDate()-1); } else break;
  }
  document.getElementById('streak-pill').textContent = `🔥 ${s} jour${s>1?'s':''}`;
}

function renderToday() {
  const dd = getDone(curDate).filter(id => habits.find(h => h.id === id));
  const total = habits.length;
  const count = dd.length;
  const pct = total > 0 ? Math.round(count / total * 100) : 0;
  const circ = 163.4;
  document.getElementById('ring-arc').style.strokeDashoffset = circ * (1 - pct/100);
  document.getElementById('ring-pct').textContent = pct + '%';
  document.getElementById('prog-title').textContent = `${count} / ${total} habitude${total>1?'s':''}`;
  const subs = ['À toi de jouer !', 'C\'est parti !', 'Tu assures !', 'Super journée !', 'Parfait ! 🎉'];
  document.getElementById('prog-sub').textContent = subs[Math.min(4, Math.floor(pct/25))];
  document.getElementById('date-main').textContent = dateLabel(curDate);
  document.getElementById('date-sub').textContent = curDate === todayStr() ? 'Aujourd\'hui' : '';
  document.getElementById('next-btn').disabled = curDate >= todayStr();

  const list = document.getElementById('habits-list');
  list.innerHTML = '';

  if (habits.length === 0) {
    list.innerHTML = '<div class="empty-state">Aucune habitude pour l\'instant.<br>Ajoute-en une ci-dessous !</div>';
    return;
  }

  habits.forEach(h => {
    const isDone = dd.includes(h.id);
    const streak = habitStreak(h.id, curDate);
    const card = document.createElement('div');
    card.className = 'habit-card' + (isDone ? ' done' : '');

    let subText;
    if (isFuture(curDate)) subText = '—';
    else if (streak > 1) subText = `🔥 ${streak} jours de suite`;
    else if (isDone) subText = '✓ Fait aujourd\'hui';
    else subText = 'Pas encore fait';

    card.innerHTML = `
      ${editMode ? `<button class="del-btn" onclick="event.stopPropagation();deleteHabit('${h.id}')">×</button>` : ''}
      <div class="h-emoji">${h.emoji}</div>
      <div class="h-info">
        <div class="h-name">${h.name}</div>
        <div class="h-sub">${subText}</div>
      </div>
      <div class="checkmark">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <polyline points="2,7 6,11 12,3" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>`;

    if (!editMode && !isFuture(curDate)) card.onclick = () => toggleHabit(h.id);
    list.appendChild(card);
  });
}

function changeDay(delta) {
  const d = new Date(curDate);
  d.setDate(d.getDate() + delta);
  const s = d.toISOString().slice(0,10);
  if (s <= todayStr()) { curDate = s; renderToday(); }
}

function toggleEdit() {
  editMode = !editMode;
  const btn = document.getElementById('edit-btn');
  btn.textContent = editMode ? 'Terminer' : 'Modifier';
  btn.classList.toggle('active', editMode);
  renderToday();
}

function toggleForm() {
  const f = document.getElementById('add-form');
  f.classList.toggle('open');
  if (f.classList.contains('open')) {
    buildEmojiGrid();
    setTimeout(() => document.getElementById('habit-input').focus(), 100);
  }
}

function buildEmojiGrid() {
  const g = document.getElementById('emoji-grid');
  g.innerHTML = '';
  EMOJIS.forEach(e => {
    const b = document.createElement('button');
    b.className = 'ep' + (e === selEmoji ? ' sel' : '');
    b.textContent = e;
    b.onclick = () => { selEmoji = e; buildEmojiGrid(); };
    g.appendChild(b);
  });
}

function addHabit() {
  const input = document.getElementById('habit-input');
  const name = input.value.trim();
  if (!name) { input.focus(); return; }
  habits.push({ id: 'h' + Date.now(), name, emoji: selEmoji });
  persist('hb_habits', habits);
  input.value = '';
  document.getElementById('add-form').classList.remove('open');
  renderToday();
  updateStreak();
}

function deleteHabit(id) {
  habits = habits.filter(h => h.id !== id);
  persist('hb_habits', habits);
  renderToday();
}

// WEEK TAB
function getMondaysForMonth(y, m) {
  const res = [];
  const d = new Date(y, m, 1);
  while (d.getDay() !== 1) d.setDate(d.getDate() - 1);
  const end = new Date(y, m + 1, 7);
  while (d <= end) { res.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+7); }
  return res;
}

function renderWeek() {
  const sel = document.getElementById('month-sel').value;
  const [y, m] = sel.split('-').map(Number);
  const mondays = getMondaysForMonth(y, m-1);
  const DAY_LABELS = ['L','M','M','J','V','S','D'];
  let html = '';
  mondays.forEach(mon => {
    const dates = Array.from({length:7}, (_, i) => {
      const d = new Date(mon); d.setDate(d.getDate()+i); return d.toISOString().slice(0,10);
    });
    const d0 = new Date(dates[0]), d6 = new Date(dates[6]);
    html += `<div class="week-block"><div class="week-block-title">${d0.getDate()} – ${d6.getDate()} ${FR_MONTHS[d6.getMonth()]}</div><div class="week-row">`;
    dates.forEach((dt, i) => {
      const dd = getDone(dt).filter(id => habits.find(h=>h.id===id));
      const tot = habits.length;
      const fut = dt > todayStr();
      const isT = dt === todayStr();
      let cls = 'empty', lbl = '–';
      if (!fut && tot > 0) {
        if (dd.length === tot) { cls = 'full'; lbl = '✓'; }
        else if (dd.length > 0) { cls = 'partial'; lbl = dd.length; }
      } else if (fut) { cls = 'future'; lbl = ''; }
      html += `<div class="day-col">
        <div class="day-lbl">${DAY_LABELS[i]}</div>
        <div class="day-dot ${cls}${isT?' today-ring':''}">${lbl}</div>
        <div class="day-num">${new Date(dt).getDate()}</div>
      </div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('week-body').innerHTML = html;
}

function populateMonthSel() {
  const sel = document.getElementById('month-sel');
  sel.innerHTML = '';
  const now = new Date();
  for (let i = -5; i <= 0; i++) {
    const d = new Date(now.getFullYear(), now.getMonth()+i, 1);
    const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const opt = document.createElement('option');
    opt.value = val;
    opt.textContent = `${FR_MONTHS_FULL[d.getMonth()]} ${d.getFullYear()}`;
    if (i === 0) opt.selected = true;
    sel.appendChild(opt);
  }
}

// STATS
function renderStats() {
  const today = new Date(todayStr());
  let totalDays = 0, perfectDays = 0, totalDone = 0;
  const counts = {};
  habits.forEach(h => counts[h.id] = 0);

  for (let i = 0; i < 30; i++) {
    const d = new Date(today); d.setDate(d.getDate()-i);
    const s = d.toISOString().slice(0,10);
    const dd = getDone(s).filter(id => habits.find(h=>h.id===id));
    if (habits.length > 0) {
      totalDays++;
      if (dd.length === habits.length) perfectDays++;
      totalDone += dd.length;
      dd.forEach(id => { if (counts[id] !== undefined) counts[id]++; });
    }
  }

  const avgPct = habits.length > 0 && totalDays > 0 ? Math.round(totalDone / (habits.length * totalDays) * 100) : 0;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-tile"><div class="stat-val">${perfectDays}</div><div class="stat-lbl">Jours parfaits (30j)</div></div>
    <div class="stat-tile"><div class="stat-val">${avgPct}%</div><div class="stat-lbl">Taux moyen (30j)</div></div>
    <div class="stat-tile"><div class="stat-val">${totalDone}</div><div class="stat-lbl">Habitudes cochées (30j)</div></div>
    <div class="stat-tile"><div class="stat-val">${habits.length}</div><div class="stat-lbl">Habitudes actives</div></div>`;

  const hstats = document.getElementById('hstats');
  if (habits.length === 0) { hstats.innerHTML = '<div class="empty-state">Aucune habitude.</div>'; return; }
  hstats.innerHTML = habits.map(h => {
    const c = counts[h.id] || 0;
    const p = totalDays > 0 ? Math.round(c / totalDays * 100) : 0;
    return `<div class="hstat-card">
      <div class="hstat-top"><span>${h.emoji} ${h.name}</span><span class="hstat-pct">${p}%</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${p}%"></div></div>
      <div class="hstat-count">${c} / ${totalDays} jours</div>
    </div>`;
  }).join('');
}

// TAB NAV
function showTab(tab) {
  ['today','week','stats'].forEach((t, i) => {
    document.getElementById('tab-'+t).style.display = t===tab ? 'block' : 'none';
    document.querySelectorAll('.tab')[i].classList.toggle('active', t===tab);
  });
  if (tab === 'week') { populateMonthSel(); renderWeek(); }
  if (tab === 'stats') renderStats();
}
